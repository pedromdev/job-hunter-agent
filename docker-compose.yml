services:
  job-hunter:
    build: .
    container_name: job-hunter
    command: ["gateway"]
    restart: unless-stopped
    volumes:
      - ./workspace:/home/nanobot/.nanobot/workspace
      - ./config.json:/home/nanobot/.nanobot/config.json:ro
      - ./RESUME.md:/home/nanobot/.nanobot/workspace/RESUME.md:ro
      - ./JOBS_PLATFORMS.md:/home/nanobot/.nanobot/workspace/JOBS_PLATFORMS.md:ro
      - ./skills/:/home/nanobot/.nanobot/workspace/skills/:ro
      - ./workspace_files/AGENTS.md:/home/nanobot/.nanobot/workspace/AGENTS.md:ro
      - ./workspace_files/SOUL.md:/home/nanobot/.nanobot/workspace/SOUL.md:ro
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?err}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:?err}
      - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM:-*}
    ports:
      - 18790:18790
      - 8765:8765
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined

  job-hunter-cli:
    build: .
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
    volumes:
      - ./workspace:/home/nanobot/.nanobot/workspace
      - ./config.json:/home/nanobot/.nanobot/config.json:ro
      - ./RESUME.md:/home/nanobot/.nanobot/workspace/RESUME.md:ro
      - ./JOBS_PLATFORMS.md:/home/nanobot/.nanobot/workspace/JOBS_PLATFORMS.md:ro
      - ./skills/:/home/nanobot/.nanobot/workspace/skills/:ro
      - ./workspace_files/AGENTS.md:/home/nanobot/.nanobot/workspace/AGENTS.md:ro
      - ./workspace_files/SOUL.md:/home/nanobot/.nanobot/workspace/SOUL.md:ro
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?err}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:?err}
      - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM:-*}
